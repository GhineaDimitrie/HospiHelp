spring.application.name=hospihelp

# ??? Baza de date ?????????????????????????????????????????????
# Railway injecteaza automat DATABASE_URL sau variabilele separate
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/hospihelp_db?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ??? JPA ??????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# ??? Jackson ??????????????????????????????????????????????????
spring.jackson.serialization.fail-on-empty-beans=false

# ??? Port ?????????????????????????????????????????????????????
# Railway injecteaza PORT automat
server.port=${PORT:8081}

# ??? JWT ??????????????????????????????????????????????????????
jwt.secret=${JWT_SECRET:HospiHelpSecretKey2024SuperLungSiComplicatPentruSiguranta}
jwt.expiration=86400000

# ??? Swagger ??????????????????????????????????????????????????
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true