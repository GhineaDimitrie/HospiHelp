<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Sănătatea noastră'">Pagină modul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar(${activePage}, ${roleCode}, ${dashboardPath})}"></div>
    <main class="main-area">
        <div th:replace="~{fragments/layout :: topbar(${pageTitle}, ${pageSubtitle}, ${displayName}, ${roleLabel})}"></div>

        <!-- Mesaje succes/eroare -->
        <div th:if="${succes}" class="panel-card"
             style="background:#d4edda;color:#155724;padding:12px 20px;margin-bottom:12px;"
             th:text="${succes}"></div>
        <div th:if="${eroare}" class="panel-card"
             style="background:#f8d7da;color:#721c24;padding:12px 20px;margin-bottom:12px;"
             th:text="${eroare}"></div>

        <section class="content-grid two-columns">
            <article class="panel-card">
                <div class="panel-head">
                    <h3>Creează utilizator</h3>
                    <span>Administrator</span>
                </div>
                <!-- Formular conectat la backend -->
                <form class="form-grid" method="POST"
                      th:action="@{/module/utilizatori/creeaza}">
                    <input type="hidden" th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>
                    <input type="text" name="numeComplet"
                           placeholder="Nume complet" required/>
                    <input type="email" name="email"
                           placeholder="Email" required/>
                    <input type="password" name="parola"
                           placeholder="Parolă" required/>
                    <select name="rol" required>
                        <option value="">Rol</option>
                        <option value="MEDIC">Medic</option>
                        <option value="RECEPTIONIST">Recepționist</option>
                        <option value="FARMACIST">Farmacist</option>
                        <option value="ADMIN">Administrator</option>
                        <option value="ASISTENTA">Asistentă</option>
                    </select>
                    <button type="submit" class="primary-button">Creează cont</button>
                </form>
            </article>
            <article class="panel-card">
                <div class="panel-head">
                    <h3>Roluri disponibile</h3>
                    <span>Conform documentației</span>
                </div>
                <div class="info-badges">
                    <span>Medic</span>
                    <span>Recepționist</span>
                    <span>Farmacist</span>
                    <span>Administrator</span>
                    <span>Asistentă</span>
                </div>
            </article>
        </section>

        <section class="panel-card">
            <div class="panel-head">
                <h3>Conturi existente</h3>
                <span>Management utilizatori</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Nume</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Status</th>
                        <th>Acțiuni</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- Date reale din backend -->
                    <tr th:each="angajat : ${angajati}">
                        <td th:text="${angajat.nume} + ' ' + ${angajat.prenume}">
                        </td>
                        <td th:text="${angajat.email}"></td>
                        <td th:text="${angajat.rol}"></td>
                        <td><span class="tag tag-green">Activ</span></td>
                        <td>
                            <form method="POST"
                                  th:action="@{/module/utilizatori/sterge}"
                                  style="display:inline">
                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}"/>
                                <input type="hidden" name="id"
                                       th:value="${angajat.idAngajat}"/>
                                <button type="submit" class="ghost-button"
                                        onclick="return confirm('Sigur ștergi?')">
                                    Șterge
                                </button>
                            </form>
                        </td>
                    </tr>
                    <!-- Fallback daca lista e goala -->
                    <tr th:if="${#lists.isEmpty(angajati)}">
                        <td colspan="5"
                            style="text-align:center;color:#888;">
                            Nu există utilizatori înregistrați.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
