<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Sănătatea noastră'">Pagină modul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar(${activePage}, ${roleCode}, ${dashboardPath})}"></div>
    <main class="main-area">
        <div th:replace="~{fragments/layout :: topbar(${pageTitle}, ${pageSubtitle}, ${displayName}, ${roleLabel})}"></div>

<section class="content-grid two-columns">
    <article class="panel-card">
        <div class="panel-head"><h3>Adaugă medicament</h3><span>Farmacie</span></div>
        <form class="form-grid">
            <input type="text" placeholder="Denumire medicament">
            <input type="number" placeholder="Cantitate">
            <input type="text" placeholder="Unitate">
            <input type="date" placeholder="Termen valabilitate">
            <button type="button" class="primary-button">Salvează în stoc</button>
        </form>
    </article>
    <article class="panel-card">
        <div class="panel-head"><h3>Indicatori</h3><span>Exemplu stocuri</span></div>
        <div class="info-badges"><span>84 medicamente</span><span>4 stocuri critice</span><span>12 loturi noi</span></div>
    </article>
</section>
<section class="panel-card">
    <div class="panel-head"><h3>Stoc disponibil</h3><span>Exemplu de tabel</span></div>
    <div class="table-wrapper">
        <table>
            <thead><tr><th>Medicament</th><th>Cantitate</th><th>Unitate</th><th>Valabilitate</th><th>Acțiuni</th></tr></thead>
            <tbody>
                <tr><td>Paracetamol</td><td>120</td><td>comprimate</td><td>2027-05-15</td><td><button class="ghost-button">Actualizează</button></td></tr>
                <tr><td>Ibuprofen</td><td>85</td><td>comprimate</td><td>2026-11-21</td><td><button class="ghost-button">Actualizează</button></td></tr>
                <tr><td>Amoxicilină</td><td>42</td><td>cutii</td><td>2026-09-10</td><td><button class="ghost-button">Eliberează</button></td></tr>
            </tbody>
        </table>
    </div>
</section>

    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
