<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - HospiHelp'">Video</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar(${activePage}, ${roleCode}, ${dashboardPath})}"></div>
    <main class="main-area">
        <div th:replace="~{fragments/layout :: topbar(${pageTitle}, ${pageSubtitle}, ${displayName}, ${roleLabel})}"></div>

        <section class="panel-card">
            <div class="panel-head">
                <h3>Monitorizare Live</h3>
                <span>Cameră Robot Spital</span>
            </div>
            <div style="text-align: center; padding: 20px;">
                <img src="https://headband-exquisite-sandbank.ngrok-free.dev"
                     alt="Stream Video Robot"
                     width="640"
                     height="480"
                     style="border: 3px solid #333; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);" />
            </div>
        </section>

    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
