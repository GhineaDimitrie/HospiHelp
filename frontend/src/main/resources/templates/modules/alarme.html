<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Sănătatea noastră'">Pagină modul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar(${activePage}, ${roleCode}, ${dashboardPath})}"></div>
    <main class="main-area">
        <div th:replace="~{fragments/layout :: topbar(${pageTitle}, ${pageSubtitle}, ${displayName}, ${roleLabel})}"></div>

<section class="panel-card">
    <div class="panel-head"><h3>Alarme raportate</h3><span>Exemple de notificări robot</span></div>
    <div class="table-wrapper">
        <table>
            <thead><tr><th>Alarmă</th><th>Severitate</th><th>Dată</th><th>Ora</th><th>Status</th></tr></thead>
            <tbody>
                <tr><td>Obstacol detectat</td><td><span class="tag tag-orange">Medie</span></td><td>20.04.2026</td><td>10:22</td><td><span class="tag tag-blue">Nerezolvată</span></td></tr>
                <tr><td>Baterie scăzută</td><td><span class="tag tag-red">Mare</span></td><td>20.04.2026</td><td>10:18</td><td><span class="tag tag-orange">În verificare</span></td></tr>
                <tr><td>Eroare scanare QR</td><td><span class="tag tag-green">Mică</span></td><td>20.04.2026</td><td>09:45</td><td><span class="tag tag-green">Rezolvată</span></td></tr>
            </tbody>
        </table>
    </div>
</section>

    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
