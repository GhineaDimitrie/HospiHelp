<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - HospiHelp'">Pagină modul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar(${activePage}, ${roleCode}, ${dashboardPath})}"></div>
    <main class="main-area">
        <div th:replace="~{fragments/layout :: topbar(${pageTitle}, ${pageSubtitle}, ${displayName}, ${roleLabel})}"></div>

        <div th:if="${succes}"
             style="background:#d4edda;color:#155724;padding:12px 20px;
                    border-radius:8px;margin-bottom:12px;"
             th:text="${succes}"></div>
        <div th:if="${eroare}"
             style="background:#f8d7da;color:#721c24;padding:12px 20px;
                    border-radius:8px;margin-bottom:12px;"
             th:text="${eroare}"></div>

        <section class="panel-card">
            <div class="panel-head">
                <h3>Comenzi recente</h3>
                <span>Date reale din baza de date</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Pacient</th>
                        <th>Medicament</th>
                        <th>Status</th>
                        <th>Data</th>
                        <th>Ora</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="comanda : ${comenzi}">
                        <td th:text="'#' + ${comanda['idComanda']}"></td>
                        <td th:text="${comanda['prescriptie'] != null
                                and comanda['prescriptie']['pacient'] != null
                                ? comanda['prescriptie']['pacient']['nume']
                                  + ' ' + comanda['prescriptie']['pacient']['prenume']
                                : '—'}">
                        </td>
                        <td th:text="${comanda['prescriptie'] != null
                                and comanda['prescriptie']['medicament'] != null
                                ? comanda['prescriptie']['medicament']['denumire']
                                : '—'}">
                        </td>
                        <td>
                                <span class="tag tag-blue"
                                      th:if="${comanda['status'] == 'ACTIV'}">
                                    Activ
                                </span>
                            <span class="tag tag-orange"
                                  th:if="${comanda['status'] == 'IN_ASTEPTARE'}">
                                    În așteptare
                                </span>
                            <span class="tag tag-green"
                                  th:if="${comanda['status'] == 'FINALIZAT'}">
                                    Finalizat
                                </span>
                            <span class="tag tag-red"
                                  th:if="${comanda['status'] == 'NEFINALIZAT'}">
                                    Nefinalizat
                                </span>
                        </td>
                        <td th:text="${comanda['data']}"></td>
                        <td th:text="${comanda['ora']}"></td>
                    </tr>
                    <tr th:if="${comenzi == null or #lists.isEmpty(comenzi)}">
                        <td colspan="6"
                            style="text-align:center;color:#888;padding:20px;">
                            Nu există comenzi înregistrate.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
