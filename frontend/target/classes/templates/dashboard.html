<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - HospiHelp'">Dashboard - HospiHelp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar(${activePage}, ${roleCode}, ${dashboardPath})}"></div>

    <main class="main-area">
        <div th:replace="~{fragments/layout :: topbar(${pageTitle}, ${pageSubtitle}, ${displayName}, ${roleLabel})}"></div>

        <section class="stats-grid">
            <article class="stat-card" th:each="stat : ${stats}"
                     th:classappend="' ' + ${stat.accent}">
                <span class="stat-title" th:text="${stat.title}">Titlu</span>
                <strong class="stat-value" th:text="${stat.value}">0</strong>
                <small class="stat-caption" th:text="${stat.caption}">Descriere</small>
            </article>
        </section>

        <section class="content-grid two-columns">
            <article class="panel-card">
                <div class="panel-head">
                    <h3>Acces rapid</h3>
                    <span>Module disponibile pentru rolul tău</span>
                </div>
                <div class="quick-links">
                    <a class="quick-link"
                       th:each="link : ${quickLinks}"
                       th:href="${link.path}"
                       th:text="${link.name}">
                    </a>
                </div>
            </article>


        </section>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
