<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Sănătatea noastră'">Pagină modul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar(${activePage}, ${roleCode}, ${dashboardPath})}"></div>
    <main class="main-area">
        <div th:replace="~{fragments/layout :: topbar(${pageTitle}, ${pageSubtitle}, ${displayName}, ${roleLabel})}"></div>

<section class="content-grid two-columns">
    <article class="panel-card wide-panel">
        <div class="panel-head"><h3>Monitorizare robot</h3><span>Exemplu de stare aproape în timp real</span></div>
        <div class="robot-preview map-preview">
            <div class="mini-map">
                <div class="corridor horizontal"></div>
                <div class="corridor vertical"></div>
                <div class="map-node pharmacy">Farmacie</div>
                <div class="map-node room1">Salon 1</div>
                <div class="map-node room2">Salon 2</div>
                <div class="map-node base">Bază</div>
                <div class="map-robot"></div>
            </div>
            <div class="robot-info">
                <div class="info-row"><span>Locație curentă:</span><strong>Coridor principal</strong></div>
                <div class="info-row"><span>Status:</span><strong>În transport</strong></div>
                <div class="info-row"><span>Ultima comandă:</span><strong>#1254</strong></div>
                <div class="info-row"><span>Mesaj:</span><strong>Obstacol evitat cu succes</strong></div>
            </div>
        </div>
    </article>
    <article class="panel-card">
        <div class="panel-head"><h3>Indicatori</h3><span>Robot 1</span></div>
        <div class="info-badges"><span>Baterie 78%</span><span>Online</span><span>Viteză 0.45 m/s</span></div>
    </article>
</section>

    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
