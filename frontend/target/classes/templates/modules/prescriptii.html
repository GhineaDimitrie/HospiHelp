<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Sănătatea noastră'">Pagină modul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar(${activePage}, ${roleCode}, ${dashboardPath})}"></div>
    <main class="main-area">
        <div th:replace="~{fragments/layout :: topbar(${pageTitle}, ${pageSubtitle}, ${displayName}, ${roleLabel})}"></div>

        <div th:if="${succes}" style="background:#d4edda;color:#155724;padding:12px 20px;border-radius:8px;margin-bottom:12px;" th:text="${succes}"></div>
        <div th:if="${eroare}" style="background:#f8d7da;color:#721c24;padding:12px 20px;border-radius:8px;margin-bottom:12px;" th:text="${eroare}"></div>

        <section class="content-grid two-columns">
            <article class="panel-card">
                <div class="panel-head">
                    <h3>Prescripție nouă</h3>
                    <span>Asociere pacient - medicament</span>
                </div>
                <form class="form-grid" method="POST" th:action="@{/module/prescriptii/adauga}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <select name="cnp" required>
                        <option value="">Selectează pacient (după CNP)</option>
                        <option th:each="p : ${pacienti}"
                                th:value="${p['cnp']}"
                                th:text="${p['nume']} + ' ' + ${p['prenume']} + ' (' + ${p['cnp']} + ')'"></option>
                    </select>

                    <select name="idMedicament" required>
                        <option value="">Selectează medicament</option>
                        <option th:each="m : ${medicamente}"
                                th:value="${m['idMedicament'] != null ? m['idMedicament'] : m['id_medicament']}"
                                th:text="${m['denumire']}"></option>
                    </select>

                    <input type="number" name="cantitate" placeholder="Cantitate (ex: 500)" required>



                    <button type="submit" class="primary-button">Salvează prescripția</button>
                </form>
            </article>

            <article class="panel-card">
                <div class="panel-head">
                    <h3>Sumar</h3>
                    <span>Statistici rapide</span>
                </div>
                <div class="info-badges">
                    <span th:text="${#lists.size(prescriptii)} + ' prescripții active'">0 prescripții active</span>
                    <span th:text="${pacientiTratamentNou != null ? #lists.size(pacientiTratamentNou) : 0} + ' pacienți cu tratament nou'">0 pacienți noi</span>
                </div>
            </article>
        </section>

        <section class="panel-card">
            <div class="panel-head">
                <h3>Prescripții existente</h3>
                <span>Date reale din baza de date</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Pacient</th>
                        <th>Medicament</th>
                        <th>Dozaj</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="pr : ${prescriptii}">
                        <td th:text="${pr['pacient']['nume']} + ' ' + ${pr['pacient']['prenume']}"></td>
                        <td th:text="${pr['medicament']['denumire']}"></td>
                        <td th:text="${pr['cantitate']}"></td>
                        <td><span class="tag tag-blue">Activă</span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
