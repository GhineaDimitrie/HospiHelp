<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Sănătatea noastră'">Pagină modul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar(${activePage}, ${roleCode}, ${dashboardPath})}"></div>
    <main class="main-area">
        <div th:replace="~{fragments/layout :: topbar(${pageTitle}, ${pageSubtitle}, ${displayName}, ${roleLabel})}"></div>

        <!-- Mesaje succes/eroare -->
        <div th:if="${succes}"
             style="background:#d4edda;color:#155724;padding:12px 20px;
                    border-radius:8px;margin-bottom:12px;"
             th:text="${succes}"></div>
        <div th:if="${eroare}"
             style="background:#f8d7da;color:#721c24;padding:12px 20px;
                    border-radius:8px;margin-bottom:12px;"
             th:text="${eroare}"></div>

        <section class="content-grid two-columns">
            <article class="panel-card">
                <div class="panel-head">
                    <h3>Adaugă pacient</h3>
                    <span>Conectat la backend</span>
                </div>
                <form class="form-grid" method="POST"
                      th:action="@{/module/pacienti/adauga}">
                    <input type="hidden" th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>
                    <input type="text" name="nume"
                           placeholder="Nume" required/>
                    <input type="text" name="prenume"
                           placeholder="Prenume" required/>
                    <input type="text" name="cnp"
                           placeholder="CNP (13 cifre)"
                           pattern="[0-9]{13}" maxlength="13" required/>
                    <input type="text" name="telefon"
                           placeholder="Telefon (10 cifre)"
                           pattern="[0-9]{10}" maxlength="10" required/>
                    <input type="text" name="judet"
                           placeholder="Județ" required/>
                    <input type="text" name="localitate"
                           placeholder="Localitate" required/>
                    <input type="text" name="strada"
                           placeholder="Strada" required/>
                    <input type="text" name="nrStrada"
                           placeholder="Nr. stradă" required/>
                    <input type="email" name="email"
                           placeholder="Email" required/>
                    <input type="text" name="profesie"
                           placeholder="Profesie"/>
                    <input type="text" name="locDeMunca"
                           placeholder="Loc de muncă"/>
                    <!-- Selectare pat liber -->
                    <select name="idPat" required>
                        <option value="">Selectează pat liber</option>
                        <option th:each="pat : ${paturiLibere}"
                                th:value="${pat.idPat}"
                                th:text="'Salon ' + ${pat.nrSalon}
                                         + ' / Pat ' + ${pat.idPat}">
                        </option>
                        <option th:if="${#lists.isEmpty(paturiLibere)}"
                                disabled>Nu există paturi libere</option>
                    </select>
                    <button type="submit" class="primary-button">
                        Salvează pacient
                    </button>
                </form>
            </article>

            <article class="panel-card">
                <div class="panel-head">
                    <h3>Căutare rapidă</h3>
                    <span>Filtrare după nume sau CNP</span>
                </div>
                <div class="search-box">
                    <input type="text" id="cautarePacient"
                           placeholder="Caută pacient..."
                           onkeyup="filtreazaPacienti()"/>
                </div>
                <div class="info-badges">
                    <span th:text="${#lists.size(pacienti)} + ' pacienți activi'">
                        0 pacienți activi
                    </span>
                    <span th:text="${#lists.size(paturiLibere)} + ' paturi libere'">
                        0 paturi libere
                    </span>
                </div>
            </article>
        </section>

        <section class="panel-card">
            <div class="panel-head">
                <h3>Listă pacienți</h3>
                <span>Date reale din baza de date</span>
            </div>
            <div class="table-wrapper">
                <table id="tabelPacienti">
                    <thead>
                    <tr>
                        <th>Nume</th>
                        <th>CNP</th>
                        <th>Telefon</th>
                        <th>Email</th>
                        <th>Salon / Pat</th>
                        <th>Acțiuni</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="pacient : ${pacienti}">
                        <td th:text="${pacient.nume} + ' '
                                         + ${pacient.prenume}"></td>
                        <td th:text="${pacient.cnp}"></td>
                        <td th:text="${pacient.telefon}"></td>
                        <td th:text="${pacient.email}"></td>
                        <td th:if="${pacient.pat != null}"
                            th:text="'Salon ' + ${pacient.pat.nrSalon}
                                         + ' / Pat ' + ${pacient.pat.idPat}">
                        </td>
                        <td th:if="${pacient.pat == null}">
                            <span style="color:#888;">Nealoc</span>
                        </td>
                        <td>
                            <!-- Muta pacient -->
                            <form method="POST"
                                  th:action="@{/module/pacienti/muta}"
                                  style="display:inline-flex;gap:6px;
                                             align-items:center;">
                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}"/>
                                <input type="hidden" name="cnp"
                                       th:value="${pacient.cnp}"/>
                                <select name="idPatNou"
                                        style="font-size:13px;padding:4px;">
                                    <option value="">Pat nou</option>
                                    <option th:each="pat : ${paturiLibere}"
                                            th:value="${pat.idPat}"
                                            th:text="'S' + ${pat.nrSalon}
                                                         + '/P' + ${pat.idPat}">
                                    </option>
                                </select>
                                <button type="submit" class="ghost-button">
                                    Mută
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${pacienti == null or #lists.isEmpty(pacienti)}">
                        <td colspan="6"
                            style="text-align:center;color:#888;
                                       padding:20px;">
                            Nu există pacienți înregistrați.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script th:src="@{/js/app.js}"></script>
<script>
    function filtreazaPacienti() {
        const input = document.getElementById('cautarePacient').value.toLowerCase();
        const rows = document.querySelectorAll('#tabelPacienti tbody tr');
        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(input) ? '' : 'none';
        });
    }
</script>
</body>
</html>
