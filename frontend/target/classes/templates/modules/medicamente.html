<div th:if="${succes}" class="alert alert-success" th:text="${succes}"></div>
<div th:if="${eroare}" class="alert alert-error" th:text="${eroare}"></div>

<form method="POST" th:action="@{/module/medicamente/adauga}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="text" name="denumire" placeholder="Denumire medicament" required/>
    <input type="number" name="stoc" placeholder="Stoc inițial" min="0" required/>
    <button type="submit">Adaugă medicament</button>
</form>

<table>
    <thead>
    <tr><th>ID</th><th>Denumire</th><th>Stoc</th></tr>
    </thead>
    <tbody>
    <tr th:each="med : ${medicamente}">
        <td th:text="${med.idMedicament}"></td>
        <td th:text="${med.denumire}"></td>
        <td th:text="${med.stoc}"></td>
    </tr>
    </tbody>
</table>
