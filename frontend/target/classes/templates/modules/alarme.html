<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Sănătatea noastră'">Pagină modul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar(${activePage}, ${roleCode}, ${dashboardPath})}"></div>
    <main class="main-area">
        <div th:replace="~{fragments/layout :: topbar(${pageTitle}, ${pageSubtitle}, ${displayName}, ${roleLabel})}"></div>

        <!-- Mesaje succes/eroare -->
        <div th:if="${succes}" class="panel-card"
             style="background:#d4edda;color:#155724;padding:12px 20px;margin-bottom:12px;"
             th:text="${succes}"></div>
        <div th:if="${eroare}" class="panel-card"
             style="background:#f8d7da;color:#721c24;padding:12px 20px;margin-bottom:12px;"
             th:text="${eroare}"></div>

        <section class="panel-card">
            <div class="panel-head">
                <h3>Alarme raportate</h3>
                <span>Notificări robot nerezolvate</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Alarmă</th>
                        <th>Mesaj</th>
                        <th>Severitate</th>
                        <th>Ora</th>
                        <th>Status</th>
                        <th>Acțiuni</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- Date reale din backend -->
                    <tr th:each="alarma : ${alarme}">
                        <td th:text="${alarma.tip}">Tip</td>
                        <td th:text="${alarma.mesaj}">Mesaj</td>
                        <td>
                                <span class="tag"
                                      th:classappend="${alarma.tip == 'BATERIE'}
                                          ? 'tag-red'
                                          : (${alarma.tip == 'OBSTACOL'}
                                              ? 'tag-orange'
                                              : 'tag-green')">
                                    <span th:text="${alarma.tip}"></span>
                                </span>
                        </td>
                        <td th:text="${#temporals.format(alarma.oraAlarma,
                                'dd.MM.yyyy HH:mm')}">
                        </td>
                        <td>
                                <span class="tag tag-blue"
                                      th:if="${!alarma.rezolvata}">
                                    Nerezolvată
                                </span>
                            <span class="tag tag-green"
                                  th:if="${alarma.rezolvata}">
                                    Rezolvată
                                </span>
                        </td>
                        <td>
                            <form method="POST"
                                  th:action="@{/module/alarme/rezolva}"
                                  th:if="${!alarma.rezolvata}">
                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}"/>
                                <input type="hidden" name="id"
                                       th:value="${alarma.idAlarma}"/>
                                <button type="submit" class="ghost-button">
                                    Rezolvă
                                </button>
                            </form>
                        </td>
                    </tr>
                    <!-- Fallback daca nu sunt alarme -->
                    <tr th:if="${alarme == null or #lists.isEmpty(alarme)}">
                        <td colspan="6"
                            style="text-align:center;color:#888;">
                            Nu există alarme active. 🎉
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
